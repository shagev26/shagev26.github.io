<h1>Demain, dès l’aube</h1>
<p><em>Victor Hugo</em></p>

<p>
Demain, dès l’aube, à l’heure où blanchit la campagne,<br>
Je partirai. Vois-tu, je sais que tu m’attends.
</p>
